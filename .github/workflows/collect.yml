# 1-minute-resolution collection despite GitHub's scheduling reality: cron
# here fires every 1–3 hours in practice (GitHub heavily throttles scheduled
# workflows), so each run that DOES start collects for ~3 hours — one
# snapshot per minute, committing every 30 minutes. Meanwhile the next
# scheduled run waits in the concurrency queue and takes over the moment
# this one ends, so coverage chains with only the ~30 s job startup as gap.
# The local collector (per-minute, gapless) remains the primary source; the
# trainer de-duplicates overlapping minutes.
name: collect
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Collect for ~3 h, one snapshot per minute, committing every 30 min
        env:
          # Optional richer fields from the official JCDecaux API:
          # add a repo secret JCDECAUX_API_KEY (free key from developer.jcdecaux.com)
          JCDECAUX_API_KEY: ${{ secrets.JCDECAUX_API_KEY }}
        run: |
          git config user.name "collector-bot"
          git config user.email "actions@github.com"
          for i in 1 2 3 4 5 6; do
            node collector/collect.mjs --burst 30 --every 60
            git add data
            if ! git diff --cached --quiet; then
              git commit -m "snapshots $(date -u +%FT%TZ)"
              git pull --rebase origin ${GITHUB_REF_NAME}
              git push
            fi
          done
